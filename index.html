<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secret Winner: Spy Chaos (LIVE READY)</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; background:#070a14; color:#fff; }
button { padding:12px 16px; margin:6px; border:none; border-radius:10px; font-size:16px; }
.hidden { display:none; }
.card { background:#141b2d; margin:16px; padding:18px; border-radius:14px; }
input { padding:10px; margin:6px; border-radius:8px; border:none; width:80%; }
</style>
</head>
<body>

<h1>🕵️ Secret Winner: LIVE READY CHAOS</h1>
<p>🌐 Multiplayer party game (stable synced version)</p>

<div id="lobby" class="card">
  <h2>Join Game</h2>
  <input id="name" placeholder="Your name" />
  <input id="room" placeholder="Room code (e.g. SPY77)" />
  <br>
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="gameLobby" class="card hidden">
  <h2>Room: <span id="roomId"></span></h2>
  <h3>Players</h3>
  <ul id="players"></ul>
  <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<div id="roleScreen" class="card hidden">
  <h2>🕵️ Your Role</h2>
  <h1 id="roleText"></h1>
  <p id="missionText"></p>
  <button onclick="readyUp()">I'm Ready</button>
</div>

<div id="roundScreen" class="card hidden">
  <h2>🎭 Round</h2>
  <p id="chaosText"></p>
  <button onclick="goVote()">Vote</button>
</div>

<div id="voteScreen" class="card hidden">
  <h2>🗳️ Vote</h2>
  <div id="voteButtons"></div>
</div>

<div id="resultScreen" class="card hidden">
  <h2 id="resultText"></h2>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let room = null;
let name = "";
let isHost = false;
let myRole = "";

function createRoom() {
  name = document.getElementById("name").value;
  room = document.getElementById("room").value || Math.random().toString(36).substring(2,7).toUpperCase();
  isHost = true;

  db.collection("rooms").doc(room).set({
    players: [name],
    started: false,
    rolesAssigned: false
  });

  enterRoom();
}

function joinRoom() {
  name = document.getElementById("name").value;
  room = document.getElementById("room").value;

  db.collection("rooms").doc(room).update({
    players: firebase.firestore.FieldValue.arrayUnion(name)
  });

  enterRoom();
}

function enterRoom() {
  document.getElementById("lobby").classList.add("hidden");
  document.getElementById("gameLobby").classList.remove("hidden");
  document.getElementById("roomId").innerText = room;

  db.collection("rooms").doc(room).onSnapshot(doc => {
    let data = doc.data();

    let list = document.getElementById("players");
    list.innerHTML = "";
    data.players.forEach(p => {
      let li = document.createElement("li");
      li.innerText = p;
      list.appendChild(li);
    });

    document.getElementById("startBtn").style.display = isHost ? "block" : "none";

    if (data.started && !data.rolesAssigned) {
      assignRoles(data.players);
    }

    if (data.started && data.rolesAssigned && myRole) {
      showRoleScreen();
    }
  });
}

function startGame() {
  db.collection("rooms").doc(room).update({
    started: true
  });
}

function assignRoles(players) {
  let secretIndex = Math.floor(Math.random() * players.length);

  let roles = players.map((p,i) => ({
    name: p,
    role: i === secretIndex ? "💰 SECRET WINNER" : "🕵️ AGENT"
  }));

  db.collection("rooms").doc(room).update({
    rolesAssigned: true,
    roles: roles
  });
}

function showRoleScreen() {
  document.getElementById("gameLobby").classList.add("hidden");
  document.getElementById("roleScreen").classList.remove("hidden");

  db.collection("rooms").doc(room).get().then(doc => {
    let data = doc.data();
    let my = data.roles.find(r => r.name === name);

    myRole = my.role;

    document.getElementById("roleText").innerText = myRole;
    document.getElementById("missionText").innerText = myRole.includes("SECRET")
      ? "🔥 Hide the truth. Everyone is watching you."
      : "Find the Secret Winner.";
  });
}

function readyUp() {
  document.getElementById("roleScreen").classList.add("hidden");
  document.getElementById("roundScreen").classList.remove("hidden");

  let chaos = [
    "🚨 Everyone must act suspicious",
    "💥 One lie is required per person",
    "👁️ Fake clue injected into system"
  ];

  document.getElementById("chaosText").innerText = chaos[Math.floor(Math.random()*chaos.length)];
}

function goVote() {
  document.getElementById("roundScreen").classList.add("hidden");
  document.getElementById("voteScreen").classList.remove("hidden");

  db.collection("rooms").doc(room).get().then(doc => {
    let players = doc.data().players;

    let container = document.getElementById("voteButtons");
    container.innerHTML = "";

    players.forEach(p => {
      let btn = document.createElement("button");
      btn.innerText = p;
      btn.onclick = () => submitVote(p);
      container.appendChild(btn);
    });
  });
}

function submitVote(voted) {
  db.collection("rooms").doc(room).collection("votes").add({
    voter: name,
    voted: voted
  });

  document.getElementById("voteScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  document.getElementById("resultText").innerText = "Vote submitted... chaos continues 😈";
}
</script>

</body>
</html>
